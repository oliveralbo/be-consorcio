version: '3.8'

services:
  db:
    image: postgres:14
    container_name: consorcio-db
    environment:
      POSTGRES_DB: consorcio_db
      POSTGRES_USER: consorcio_user
      POSTGRES_PASSWORD: 1234
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

  app:
    build: .
    container_name: consorcio-app
    ports:
      - "3000:3000"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USERNAME=consorcio_user
      - DB_PASSWORD=1234
      - DB_DATABASE=consorcio_db
      - JWT_SECRET=SECRET_KEY_PARA_PRODUCCION
    depends_on:
      - db
    networks:
      - app-network

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge